services:
  # ── Service 1: PostgreSQL database ──────────────
  db:
    image: postgres:15
    container_name: blooddonor_db
    environment:
      POSTGRES_DB: blooddonor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 59F21a0463@123AP40BX3122
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Service 2: Flask app ─────────────────────────
  web:
    image: fayazshaik15f21a0463/blood-donor-app:latest   # ← CHANGED
    container_name: blooddonor_web
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: blooddonor
      DB_USER: postgres
      DB_PASSWORD: 59F21a0463@123AP40BX3122
      SECRET_KEY: blooddonor2024
    depends_on:
      db:
        condition: service_healthy

# ── Volume: stores postgres data permanently ──────
volumes:
  postgres_data:
