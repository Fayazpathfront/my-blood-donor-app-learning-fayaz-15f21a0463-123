{% extends "base.html" %}
{% block content %}

<div class="form-container">
  <h2>Request Blood — Doctor Portal</h2>
  <p class="form-subtitle">Fill in patient details. We'll find matching donors nearby.</p>

  <form method="POST" action="{{ url_for('request_blood') }}">

    <div class="form-row">
      <div class="form-group">
        <label>Patient Name</label>
        <input type="text" name="patient_name" placeholder="Patient full name" required>
      </div>
      <div class="form-group">
        <label>Hospital Name</label>
        <input type="text" name="hospital" placeholder="e.g. RIMS Hospital" required>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Blood Group Needed</label>
        <select name="blood_group" required>
          <option value="">-- Select --</option>
          <option>A+</option><option>A-</option>
          <option>B+</option><option>B-</option>
          <option>O+</option><option>O-</option>
          <option>AB+</option><option>AB-</option>
        </select>
      </div>
      <div class="form-group">
        <label>Units Needed</label>
        <input type="number" name="units" min="1" max="10" value="1" required>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Contact Phone</label>
        <input type="tel" name="contact" placeholder="Doctor's phone" required>
      </div>
      <div class="form-group">
        <label>City</label>
        <input type="text" name="city" placeholder="e.g. Anantapur" required>
      </div>
    </div>

    <div class="form-group">
      <label>Urgency Level</label>
      <div class="radio-group">
        <label><input type="radio" name="urgency" value="normal" checked> Normal</label>
        <label><input type="radio" name="urgency" value="critical"> Critical</label>
      </div>
    </div>

    <button type="submit" class="btn btn-danger btn-full">Send Blood Request</button>
  </form>
</div>

{% endblock %}
